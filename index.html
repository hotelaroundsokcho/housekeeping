<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>객실정비 | Hotel Around Sokcho</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3248;--accent:#6c8fff;--text:#e8eaf0;--text2:#8b91a8;--uncleaned:#ef4444;--cleaning:#f59e0b;--cleaned:#22c55e;--inspection:#a855f7;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh;}
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.logo{text-align:center;margin-bottom:40px;}
.logo h1{font-size:22px;font-weight:700;}
.logo p{color:var(--text2);font-size:12px;margin-top:4px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;width:100%;max-width:360px;}
.tab-row{display:flex;gap:8px;margin-bottom:24px;}
.tab-btn{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;}
.form-group input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;outline:none;}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;}
.error-msg{color:var(--uncleaned);font-size:12px;text-align:center;margin-top:10px;min-height:16px;}
#app{display:none;flex-direction:column;min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.app-title{font-size:15px;font-weight:700;}
.sub{font-size:11px;color:var(--text2);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;}
.nav-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.nav-tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.content{flex:1;overflow-y:auto;padding:16px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 8px;text-align:center;}
.stat-num{font-size:22px;font-weight:700;}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px;}
.s-uncleaned .stat-num{color:var(--uncleaned);}
.s-cleaning .stat-num{color:var(--cleaning);}
.s-cleaned .stat-num{color:var(--cleaned);}
.s-inspection .stat-num{color:var(--inspection);}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.rooms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:600px){.rooms-grid{grid-template-columns:repeat(3,1fr);}}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;cursor:pointer;position:relative;overflow:hidden;}
.room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.room-card.uncleaned::before{background:var(--uncleaned);}
.room-card.cleaning::before{background:var(--cleaning);}
.room-card.cleaned::before{background:var(--cleaned);}
.room-card.inspection::before{background:var(--inspection);}
.room-no{font-size:20px;font-weight:700;}
.room-type{font-size:10px;color:var(--text2);margin-top:2px;}
.room-status{display:inline-block;margin-top:8px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;}
.status-uncleaned{background:rgba(239,68,68,.15);color:var(--uncleaned);}
.status-cleaning{background:rgba(245,158,11,.15);color:var(--cleaning);}
.status-cleaned{background:rgba(34,197,94,.15);color:var(--cleaned);}
.status-inspection{background:rgba(168,85,247,.15);color:var(--inspection);}
.room-maid{font-size:10px;color:var(--text2);margin-top:4px;}
.reset-btn{width:100%;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--uncleaned);border-radius:var(--radius);font-size:13px;cursor:pointer;margin-bottom:16px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal h3{font-size:18px;font-weight:700;margin-bottom:4px;}
.room-type-lg{font-size:12px;color:var(--text2);margin-bottom:20px;}
.modal-section{margin-bottom:20px;}
.modal-section label{display:block;font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:600;}
.status-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.status-btn{padding:12px 8px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.status-btn.sel-uncleaned{border-color:var(--uncleaned);background:rgba(239,68,68,.15);color:var(--uncleaned);}
.status-btn.sel-cleaning{border-color:var(--cleaning);background:rgba(245,158,11,.15);color:var(--cleaning);}
.status-btn.sel-cleaned{border-color:var(--cleaned);background:rgba(34,197,94,.15);color:var(--cleaned);}
.status-btn.sel-inspection{border-color:var(--inspection);background:rgba(168,85,247,.15);color:var(--inspection);}
.maid-input,.note-input{width:100%;padding:11px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;}
.note-input{resize:none;height:80px;}
.modal-save-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
.notes-list{margin-top:10px;display:flex;flex-direction:column;gap:8px;max-height:180px;overflow-y:auto;}
.note-item{background:var(--surface2);border-radius:8px;padding:10px 12px;font-size:12px;}
.note-meta{color:var(--text2);font-size:10px;margin-bottom:4px;}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 110px);}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;}
.chat-bubble.mine{background:var(--accent);color:#fff;align-self:flex-end;}
.chat-bubble.other{background:var(--surface2);color:var(--text);align-self:flex-start;}
.chat-sender{font-size:10px;color:var(--text2);margin-bottom:3px;}
.chat-time{font-size:10px;opacity:.6;margin-top:4px;}
.chat-input-row{padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;}
.chat-input-row input{flex:1;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:14px;outline:none;}
.chat-send-btn{padding:11px 18px;background:var(--accent);color:#fff;border:none;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;}
.loading-box{background:var(--surface);border-radius:16px;padding:28px 32px;text-align:center;}
.loading-box p{margin-top:12px;font-size:13px;color:var(--text2);}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:24px;font-size:13px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="logo"><h1>🏨 Hotel Around Sokcho</h1><p>Housekeeping Management System</p></div>
  <div class="login-card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('admin')">관리자 Admin</button>
      <button class="tab-btn" onclick="switchTab('maid')">메이드 Maid</button>
    </div>
    <div id="adminForm">
      <div class="form-group"><label>PIN 번호 (4자리)</label>
        <input type="password" id="pinInput" maxlength="4" inputmode="numeric" placeholder="● ● ● ●" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn-primary" onclick="login()">로그인</button>
    </div>
    <div id="maidForm" style="display:none">
      <div class="form-group"><label>이름 입력</label>
        <input type="text" id="maidNameInput" placeholder="예: 김미영" onkeydown="if(event.key==='Enter')loginMaid()">
      </div>
      <button class="btn-primary" onclick="loginMaid()">입장하기</button>
    </div>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>
<div id="app">
  <div class="app-header">
    <div><div class="app-title">🏨 객실정비 현황</div><div class="sub" id="headerSub"></div></div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showTab('rooms')">🏠 객실현황</div>
    <div class="nav-tab" onclick="showTab('chat')">💬 채팅</div>
  </div>
  <div id="tabRooms" class="content">
    <div class="stats-row">
      <div class="stat-card s-uncleaned"><div class="stat-num" id="cnt0">0</div><div class="stat-label">미정비</div></div>
      <div class="stat-card s-cleaning"><div class="stat-num" id="cnt1">0</div><div class="stat-label">정비중</div></div>
      <div class="stat-card s-cleaned"><div class="stat-num" id="cnt2">0</div><div class="stat-label">완료</div></div>
      <div class="stat-card s-inspection"><div class="stat-num" id="cnt3">0</div><div class="stat-label">점검필요</div></div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all')">전체</button>
      <button class="filter-btn" onclick="setFilter('uncleaned')">미정비</button>
      <button class="filter-btn" onclick="setFilter('cleaning')">정비중</button>
      <button class="filter-btn" onclick="setFilter('cleaned')">완료</button>
      <button class="filter-btn" onclick="setFilter('inspection')">점검필요</button>
    </div>
    <button class="reset-btn" id="resetBtn" style="display:none" onclick="confirmReset()">⚠️ 전체 초기화 (업무 시작)</button>
    <div class="rooms-grid" id="roomsGrid"></div>
  </div>
  <div id="tabChat" style="display:none">
    <div class="chat-wrap">
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="chat-send-btn" onclick="sendMsg()">전송</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="roomModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="mRoomNo"></h3>
    <div class="room-type-lg" id="mRoomType"></div>
    <div class="modal-section"><label>정비 상태 변경</label>
      <div class="status-btns">
        <button class="status-btn" onclick="selStatus('uncleaned')">🔴 미정비<br><small>Uncleaned</small></button>
        <button class="status-btn" onclick="selStatus('cleaning')">🟡 정비중<br><small>Cleaning</small></button>
        <button class="status-btn" onclick="selStatus('cleaned')">🟢 정비완료<br><small>Cleaned</small></button>
        <button class="status-btn" onclick="selStatus('inspection')">🟣 점검필요<br><small>Inspection</small></button>
      </div>
    </div>
    <div class="modal-section" id="maidSec"><label>메이드 배정 (관리자)</label><input type="text" class="maid-input" id="maidInput" placeholder="메이드 이름"></div>
    <div class="modal-section"><label>메모 추가</label><textarea class="note-input" id="noteInput" placeholder="특이사항..."></textarea></div>
    <div class="modal-section"><label>메모 이력</label><div class="notes-list" id="notesList"></div></div>
    <button class="modal-save-btn" onclick="saveRoom()">저장</button>
  </div>
</div>
<div class="loading-overlay" id="loadingOv" style="display:none"><div class="loading-box"><div class="spinner"></div><p id="loadingMsg">처리 중...</p></div></div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
